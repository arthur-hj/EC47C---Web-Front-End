<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arthur Henrique Jardim da Cunha Pinto</title>
</head>
<body>
    <form>
        <label for="username">Nome Completo:</label><br>
        <input type="text" id = "username" name = "username" required><br>

        <label for="age">Idade:</label><br>
        <input type="number" id = "age" name = "age" min="18" max="120" required><br>

        <label for="email">E-mail:</label><br>
        <input type="email" id="email" name="email" required><br>

        <label for="interests">Conteúdo de maior interesse:</label><br>
        <select name="interests" id="interests">
            <option value="css">CSS</option>
            <option value="html">HTML</option>
            <option value="javascript" selected>JavaScript</option>
        </select><br>

        <label for="opinion">Deixe sua opinião:</label><br>
        <textarea name="opinion" id="opinion" rows="5" cols="30"></textarea><br>

        <label for="pwd">Senha:</label><br>
        <input type="password" name="pwd" id="pwd" required>
        <br>
        <br>
        <input type="submit" value="Enviar">
    </form>
</body>
</html>
